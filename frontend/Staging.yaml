apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-frontend
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: react-frontend
  template:
    metadata:
      labels:
        app: react-frontend
    spec:
      containers:
      - name: react-frontend
        image: harbor.riq-homelab.local:5000/react-frontend:latest
        envFrom:
        - configMapRef:
            name: api-endpoint