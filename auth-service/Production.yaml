apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: harbor.riq-homelab.local:5000/auth-service:${IMAGE_TAG}
        envFrom:
        - configMapRef:
            name: postgres-config
        - secretRef:
            name: postgres-secret