apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-service
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book-service
  template:
    metadata:
      labels:
        app: book-service
    spec:
      containers:
      - name: book-service
        image: harbor.riq-homelab.local:5000/book-service:${IMAGE_TAG}
        envFrom:
        - configMapRef:
            name: postgres-config
        - secretRef:
            name: postgres-secret